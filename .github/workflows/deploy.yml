name: Deploy Galeria Intercambio (Docker Swarm)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USER }}/galeria-intercambio:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USER }}/galeria-intercambio:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Garante que a imagem nova está no servidor
            docker pull ${{ secrets.DOCKER_USER }}/galeria-intercambio:latest
            
            # 2. Atualiza a Stack (O Swarm detecta a mudança e faz o rolling update)
            # Isso mantém as labels do Traefik e as redes que estão no seu galerias.yml
            cd ~/stacks/05-apps
            docker stack deploy -c galerias.yml galerias
            
            echo "Deploy da stack galerias finalizado!"