name: Deploy Galeria Intercambio (Docker Swarm)

on:
push:
branches:
- main

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:
  # 📥 Baixa o código
  - name: Checkout
    uses: actions/checkout@v3

  # 🔐 Login no Docker Hub
  - name: Login Docker Hub
    run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

  # 🏗️ Build da imagem
  - name: Build Docker image
    run: docker build -t ${{ secrets.DOCKER_USER }}/galeria-intercambio:latest .

  # 📤 Push da imagem
  - name: Push Docker image
    run: docker push ${{ secrets.DOCKER_USER }}/galeria-intercambio:latest

  # 🚀 Deploy no servidor (Docker Swarm)
  - name: Deploy via SSH
    uses: appleboy/ssh-action@v1.0.0
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: ${{ secrets.SERVER_USER }}
      key: ${{ secrets.SERVER_SSH_KEY }}
      script: |
        IMAGE=${{ secrets.DOCKER_USER }}/galeria-intercambio:latest
        SERVICE_NAME=galeria-intercambio

        echo "📥 Baixando imagem..."
        docker pull $IMAGE

        if docker service inspect $SERVICE_NAME > /dev/null 2>&1; then
          echo "🔄 Atualizando serviço existente..."
          docker service update \
            --image $IMAGE \
            $SERVICE_NAME
        else
          echo "🆕 Criando novo serviço..."
          docker service create \
            --name $SERVICE_NAME \
            --publish 7002:80 \
            --replicas 1 \
            $IMAGE
        fi

        echo "✅ Deploy finalizado!"
```
